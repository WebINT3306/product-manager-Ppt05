<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    th {
      cursor: pointer;
      background: #eee;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    tr:hover {
      background: #dfefff;
    }

    .form {
      margin-top: 20px;
      background: white;
      padding: 15px;
    }

    input {
      margin: 5px;
      padding: 5px;
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Danh sách sản phẩm</h2>

<table id="product-table">
  <thead>
    <tr>
      <th>STT</th>
      <th id="sort-name">Tên sản phẩm</th>
      <th>Danh mục</th>
      <th>Đơn giá</th>
      <th>Số lượng</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="form">
  <h3>Thêm sản phẩm</h3>
  <input id="input-name" placeholder="Tên sản phẩm">
  <input id="input-category" placeholder="Danh mục">
  <input id="input-price" type="number" placeholder="Đơn giá">
  <input id="input-quantity" type="number" placeholder="Số lượng">
  <button id="btn-add">Thêm</button>
</div>

<script>
let products = [];
let sortAsc = true;

// Render table
function renderTable() {
  const tbody = document.querySelector("#product-table tbody");
  tbody.innerHTML = "";

  products.forEach((p, index) => {
    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${index + 1}</td>
      <td>${p.name}</td>
      <td>${p.category || ""}</td>
      <td>${p.price}</td>
      <td>${p.quantity}</td>
    `;

    tbody.appendChild(row);
  });
}

// AJAX load
const xhr = new XMLHttpRequest();
xhr.onreadystatechange = function() {
  if (xhr.readyState === 4 && xhr.status === 200) {
    products = JSON.parse(xhr.responseText);
    renderTable();
  }
};
xhr.open("GET", "products.json");
xhr.send();

// SORT (FIX: dùng addEventListener)
const nameHeader = document.getElementById("sort-name");

nameHeader.addEventListener("click", function() {
  products.sort((a, b) => {
    return sortAsc
      ? a.name.localeCompare(b.name)
      : b.name.localeCompare(a.name);
  });

  sortAsc = !sortAsc;

  this.textContent = "Tên sản phẩm " + (sortAsc ? "▲" : "▼");

  renderTable();
});

// ADD PRODUCT
function addProduct() {
  let name = document.getElementById("input-name").value.trim();
  let category = document.getElementById("input-category").value.trim();
  let price = parseFloat(document.getElementById("input-price").value);
  let quantity = parseInt(document.getElementById("input-quantity").value);

  if (name.length < 3) return;
  if (isNaN(price) || price <= 0) return;
  if (isNaN(quantity) || quantity < 1) return;

  let newProduct = {
    id: Date.now(),
    name,
    category,
    price,
    quantity
  };

  products.push(newProduct);
  renderTable();

  // reset
  document.getElementById("input-name").value = "";
  document.getElementById("input-category").value = "";
  document.getElementById("input-price").value = "";
  document.getElementById("input-quantity").value = "";
}

// FIX: handle cả click + submit
document.getElementById("btn-add").addEventListener("click", addProduct);

const form = document.querySelector("form");
if (form) {
  form.addEventListener("submit", function(e) {
    e.preventDefault();
    addProduct();
  });
}
</script>

</body>
</html>
